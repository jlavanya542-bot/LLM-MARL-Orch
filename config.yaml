project:
  name: LLM-MARL-Orch
  version: 1.0.0
  description: Reproducible simulation for semantic-aware multi-agent container scheduling
  manuscript_title: Large Language Model Guided Multiagent Scheduling for Energy Efficient Cloud Native Systems

reproducibility:
  master_seed: 42
  experiment_seeds: [11, 23, 37, 41, 53, 67, 79, 83, 97, 101]
  deterministic: true

dataset:
  node_count: 100
  workload_count: 5000
  prompt_corpus_size: 10000
  train_fraction: 0.70
  validation_fraction: 0.10
  test_fraction: 0.20
  workload_classes: [LS, TC, TX, HB]

simulation:
  scheduling_horizon_hours: 24
  energy_reference_wh: 1.25
  carbon_reference_g: 0.60
  wait_reference_ms: 300.0
  response_reference_ms: 500.0
  node_decay: 0.93
  drift_window: 100
  drift_threshold: 0.18
  semantic_refresh_interval: 50
  asynchronous_semantics: true
  cache_semantic_outputs: true

semantic_agent:
  backend: deterministic_cached
  local_model_name: google/flan-t5-small
  weights:
    LS: {sla: 0.50, energy: 0.13, imbalance: 0.14, fairness: 0.10, carbon: 0.13}
    TC: {sla: 0.20, energy: 0.30, imbalance: 0.17, fairness: 0.10, carbon: 0.23}
    TX: {sla: 0.45, energy: 0.14, imbalance: 0.18, fairness: 0.13, carbon: 0.10}
    HB: {sla: 0.31, energy: 0.23, imbalance: 0.18, fairness: 0.15, carbon: 0.13}

marl:
  learning_rate: 0.001
  discount_factor: 0.99
  epsilon_start: 0.20
  epsilon_end: 0.02
  epsilon_decay: 0.997
  peer_influence: 0.08
  gradient_clip: 2.0
  l2_regularization: 0.0001
  feature_dimension: 9

experiment:
  full_repetitions: 10
  quick_repetitions: 2
  quick_workloads: 600
  schedulers:
    - K8s-Default
    - Energy-Aware
    - DeepSched
    - MARL-Coop
    - LLM-Heuristic
    - LLM-MARL-Orch
  ablations:
    - Full
    - No-Semantic-Guidance
    - No-MARL
    - No-Fairness
    - No-Drift-Detection
    - Static-Weights

outputs:
  directory: artifacts
  save_step_logs: false
  generate_figures: true
  confidence_level: 0.95
